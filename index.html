<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brick Brain – LEGO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red:    #E3000B;
    --yellow: #FFD700;
    --blue:   #006CB7;
    --black:  #0D0D0D;
    --white:  #FFFFFF;
  }

  body {
    background: var(--black);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LEGO stud texture background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle 6px at center, rgba(255,255,255,.07) 100%, transparent 100%);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 28px 40px 20px;
  }

  .lego-logo {
    background: var(--red);
    color: var(--yellow);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    padding: 4px 18px 2px;
    border-radius: 6px;
    letter-spacing: 3px;
    border: 3px solid var(--yellow);
    box-shadow: 4px 4px 0 var(--yellow);
  }

  .sub-title {
    color: var(--white);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 4px;
    opacity: .55;
    text-transform: uppercase;
  }

  /* ── MASONRY-STYLE GRID ── */
  .grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-auto-rows: 80px;
    gap: 10px;
    padding: 10px 28px 60px;
  }

  /* Each box occupies different columns/rows to create varied sizes */
  .box:nth-child(1) { grid-column: span 5; grid-row: span 4; }
  .box:nth-child(2) { grid-column: span 4; grid-row: span 3; }
  .box:nth-child(3) { grid-column: span 3; grid-row: span 5; }
  .box:nth-child(4) { grid-column: span 4; grid-row: span 4; }
  .box:nth-child(5) { grid-column: span 5; grid-row: span 3; }
  .box:nth-child(6) { grid-column: span 3; grid-row: span 4; }

  /* Color assignments (primary, white, black) */
  .box:nth-child(1) { --bg: var(--red);    --txt: var(--white); }
  .box:nth-child(2) { --bg: var(--white);  --txt: var(--black); }
  .box:nth-child(3) { --bg: var(--yellow); --txt: var(--black); }
  .box:nth-child(4) { --bg: var(--blue);   --txt: var(--white); }
  .box:nth-child(5) { --bg: var(--black);  --txt: var(--white); border: 2px solid #333; }
  .box:nth-child(6) { --bg: var(--red);    --txt: var(--white); }

  .box {
    position: relative;
    background-color: var(--bg);
    overflow: hidden;
    cursor: pointer;
    border-radius: 4px;
  }

  /* ── STUD ACCENTS on each box top-right ── */
  .box::before {
    content: '';
    position: absolute;
    top: 8px; right: 8px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: rgba(0,0,0,.18);
    border: 2px solid rgba(255,255,255,.25);
    z-index: 1;
  }

  /* Background image (optional LEGO noise) */
  .box-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: transform .6s cubic-bezier(.22,.61,.36,1), filter .4s ease;
  }

  .box:hover .box-bg {
    transform: scale(1.06);
    filter: brightness(.25) saturate(.3);
  }

  /* headline */
  .box-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 14px 16px 18px;
    z-index: 3;
    transition: opacity .35s ease, transform .35s ease;
  }

  .box-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: .75rem;
    letter-spacing: 4px;
    opacity: .5;
    color: var(--txt);
    display: block;
    margin-bottom: 4px;
  }

  .box-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.1rem, 2.2vw, 1.9rem);
    line-height: 1.1;
    color: var(--txt);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── HOVER OVERLAY ── */
  .box-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    opacity: 0;
    transition: opacity .35s ease;
    z-index: 4;
    padding: 20px;
  }

  .box:hover .box-overlay { opacity: 1; }
  .box:hover .box-label   { opacity: 0; transform: translateY(6px); }

  .overlay-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(.95rem, 1.8vw, 1.5rem);
    color: var(--white);
    text-align: center;
    letter-spacing: 2px;
    line-height: 1.15;
  }

  .btn-row {
    display: flex;
    gap: 10px;
  }

  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: .95rem;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 8px 22px;
    border: 2px solid var(--white);
    background: transparent;
    color: var(--white);
    cursor: pointer;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    transition: background .2s, color .2s, transform .15s;
    display: inline-block;
  }

  .btn:hover {
    background: var(--white);
    color: var(--black);
    transform: translateY(-2px);
  }

  .btn.accent {
    background: var(--yellow);
    border-color: var(--yellow);
    color: var(--black);
  }

  .btn.accent:hover {
    background: #fff0a0;
    border-color: #fff0a0;
  }

  /* ── staggered entrance animation ── */
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(30px) scale(.97); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  .box {
    animation: fadeUp .55s cubic-bezier(.22,.61,.36,1) both;
  }
  .box:nth-child(1) { animation-delay: .05s; }
  .box:nth-child(2) { animation-delay: .12s; }
  .box:nth-child(3) { animation-delay: .19s; }
  .box:nth-child(4) { animation-delay: .26s; }
  .box:nth-child(5) { animation-delay: .33s; }
  .box:nth-child(6) { animation-delay: .40s; }

  /* ── responsive ── */
  @media (max-width: 768px) {
    .grid { grid-template-columns: repeat(6, 1fr); gap: 6px; padding: 6px 12px 40px; }
    .box:nth-child(1) { grid-column: span 6; grid-row: span 3; }
    .box:nth-child(2) { grid-column: span 3; grid-row: span 3; }
    .box:nth-child(3) { grid-column: span 3; grid-row: span 3; }
    .box:nth-child(4) { grid-column: span 4; grid-row: span 3; }
    .box:nth-child(5) { grid-column: span 2; grid-row: span 3; }
    .box:nth-child(6) { grid-column: span 6; grid-row: span 3; }
    header { padding: 18px 16px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="lego-logo">LEGO</div>
  <span class="sub-title">Brick Brain HQ</span>
</header>

<div class="grid" id="grid"></div>

<script>
const items = [
  { title: "About\nBrick Brain",  num: "01" },
  { title: "Roles &\nResponsibilities", num: "02" },
  { title: "Rules",               num: "03" },
  { title: "Previous\nProjects",  num: "04" },
  { title: "Idea\nList",          num: "05" },
  { title: "Nomination\nSheet",   num: "06" },
];

// Mosaic-style BG patterns per box (CSS gradient textures – no external images needed)
const bgs = [
  "radial-gradient(ellipse at 20% 80%, rgba(255,200,0,.35) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(255,255,255,.08) 0%, transparent 50%)",
  "linear-gradient(135deg, rgba(0,0,0,.06) 25%, transparent 25%) 0 0 / 20px 20px",
  "radial-gradient(circle at 70% 30%, rgba(255,255,255,.2) 0%, transparent 55%)",
  "linear-gradient(45deg, rgba(255,255,255,.05) 25%, transparent 25%) 0 0 / 16px 16px",
  "radial-gradient(ellipse at 50% 100%, rgba(255,215,0,.12) 0%, transparent 70%)",
  "linear-gradient(135deg, rgba(255,255,255,.06) 25%, transparent 25%) 0 0 / 24px 24px",
];

const grid = document.getElementById('grid');

items.forEach((item, i) => {
  const box = document.createElement('div');
  box.className = 'box';

  // bg texture div
  const bg = document.createElement('div');
  bg.className = 'box-bg';
  bg.style.backgroundImage = bgs[i];

  // label
  const label = document.createElement('div');
  label.className = 'box-label';
  label.innerHTML = `
    <span class="box-number">${item.num}</span>
    <div class="box-title">${item.title.replace('\n','<br>')}</div>
  `;

  // overlay
  const overlay = document.createElement('div');
  overlay.className = 'box-overlay';
  overlay.innerHTML = `
    <div class="overlay-title">${item.title.replace('\n','<br>')}</div>
    <div class="btn-row">
      <a class="btn accent" href="https://www.lego.com/en-us" target="_blank">FR</a>
      <a class="btn"        href="https://www.lego.com/en-us" target="_blank">EN</a>
    </div>
  `;

  box.appendChild(bg);
  box.appendChild(label);
  box.appendChild(overlay);
  grid.appendChild(box);
});
</script>
</body>
</html>
